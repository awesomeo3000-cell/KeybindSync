name: Build Windows EXE

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run syntax check
        run: |
          python -m py_compile src\wow_keybind_app.py src\wow_keybind_sync.py

      - name: Run tests
        run: |
          python -m unittest discover -s tests -v

      - name: Build EXE
        run: |
          python -m PyInstaller --onefile --windowed --name WoWKeyBindSync src\wow_keybind_app.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: WoWKeyBindSync-windows
          path: dist\WoWKeyBindSync.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist\WoWKeyBindSync.exe
